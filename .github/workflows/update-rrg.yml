name: Actualizar RRG

on:
  schedule:
    # 13:30-20:00 UTC ~ 9:30-16:00 ET (horario NYSE en horario de verano de EEUU).
    # Fuera de DST hay un desfase de 1h, es irrelevante para rotación sectorial.
    - cron: "*/30 13-19 * * 1-5"
    - cron: "0 20 * * 1-5"
  workflow_dispatch: {}   # permite lanzarlo a mano desde la pestaña Actions

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Calcular RRG
        run: python rrg_calculator.py

      - name: Commit si hay cambios
        run: |
          git config user.name "rrg-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Actualiza data.json [skip ci]"
          git push
